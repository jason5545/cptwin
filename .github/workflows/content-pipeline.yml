name: 內容資料管線

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'data/posts.json'
      - 'config/categories.json'
      - 'assets/main.js'
      - 'assets/main.min.js'
      - 'assets/main-static.js'
      - 'assets/main-static.min.js'
      - 'assets/shared-ui.js'
      - 'assets/styles.css'
      - 'assets/styles.min.css'
      - 'package.json'
      - 'post.html'
      - 'scripts/build-assets.js'
      - 'scripts/generate-responsive-images.js'
      - 'scripts/generate-redirects.js'
      - 'scripts/generate-sitemap.js'
      - 'scripts/sync-feed.js'
      - 'scripts/validate-content.js'
  pull_request:
    branches:
      - main
    paths:
      - 'index.html'
      - 'data/posts.json'
      - 'config/categories.json'
      - 'assets/main.js'
      - 'assets/main.min.js'
      - 'assets/main-static.js'
      - 'assets/main-static.min.js'
      - 'assets/shared-ui.js'
      - 'assets/styles.css'
      - 'assets/styles.min.css'
      - 'package.json'
      - 'post.html'
      - 'scripts/build-assets.js'
      - 'scripts/generate-responsive-images.js'
      - 'scripts/generate-redirects.js'
      - 'scripts/generate-sitemap.js'
      - 'scripts/sync-feed.js'
      - 'scripts/validate-content.js'
  workflow_dispatch:

jobs:
  content-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝相依套件
        run: npm install --no-package-lock

      - name: 同步 minified assets
        run: npm run build:assets

      - name: 產生回應式圖片變體
        run: node scripts/generate-responsive-images.js

      - name: 生成文章靜態頁與重定向
        run: node scripts/generate-redirects.js

      - name: 生成 Sitemap
        run: node scripts/generate-sitemap.js

      - name: 同步 Feed
        run: node scripts/sync-feed.js

      - name: 驗證內容一致性
        run: npm run validate

      - name: 檢查變更
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "發現需同步的產出檔案"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "產出檔案已是最新"
          fi

      - name: PR 檢查（禁止未同步產出）
        if: github.event_name == 'pull_request' && steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "❌ 偵測到未同步的產出檔案，請先更新後再送出 PR"
          git status --short
          git diff --stat
          exit 1

      - name: 提交同步結果
        if: github.event_name == 'push' && steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html data/posts.json feed.json sitemap.xml assets/main.min.js assets/main-static.min.js assets/styles.min.css content/img/ */*/index.html
          git commit -m "chore: sync content artifacts

          - regenerate static article routes
          - rebuild minified assets
          - refresh sitemap.xml
          - sync feed.json"

      - name: 推送變更（含 rebase 防止競爭條件）
        if: github.event_name == 'push' && steps.check_changes.outputs.has_changes == 'true'
        run: |
          git pull --rebase origin main
          git push origin HEAD:main
